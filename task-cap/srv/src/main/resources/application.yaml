spring:
  datasource:
    url: jdbc:h2:mem:taskdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
  h2:
    console:
      enabled: true
      path: /h2-console

cds:
  datasource:
    dialect: h2
  security:
    mock:
      enabled: true

hyperspace:
  proxy-url: ${ANTHROPIC_PROXY_URL:http://localhost:6655/anthropic/v1/messages}
  api-key: ${ANTHROPIC_API_KEY:69f05b9c-69ba-4da0-8b72-9adb9d20c895}
  model: ${ANTHROPIC_MODEL:claude-haiku-4-5-20251001}

cors:
  allowed-origin: ${FRONTEND_URL:http://localhost:5173}

agent:
  interval-ms: 10000

monitor:
  interval-ms: 2000
